{% extends "main/base.html" %}
{% load static %}
{% block title %}Checkout – {{ product.title }}{% endblock %}

{% block content %}
<div class="static-page checkout-page">
  <div class="content-card checkout-card">
    <h1 class="page-title">Checkout</h1>
    <div class="checkout-summary">
      <div class="checkout-product">
        {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.title }}" class="checkout-product-image">
        {% else %}
        <div class="checkout-product-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        {% endif %}
        <div class="checkout-product-info">
          <h2 class="checkout-product-title">{{ product.title }}</h2>
          <p class="checkout-product-price">${{ product.price|floatformat:2 }}</p>
        </div>
      </div>
      <form method="post" class="checkout-form">
        {% csrf_token %}
        <button type="submit" class="btn-checkout-confirm">Confirm purchase</button>
      </form>
      <p class="checkout-back">
        <a href="{% url 'product_detail' product.pk %}">← Back to item</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
