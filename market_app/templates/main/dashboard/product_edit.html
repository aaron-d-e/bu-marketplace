{% extends "main/dashboard/base.html" %}
{% block dashboard_title %}Edit Product{% endblock %}
{% load crispy_forms_tags %}
{% block dashboard_content %}
<h1 class="mb-4">Edit Product</h1>
<div class="card">
  <div class="card-body">
    <form method="post" action="{% url 'dashboard_product_edit' product.pk %}" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'dashboard_products' %}" class="btn btn-outline-secondary">Cancel</a>
        <a href="{% url 'dashboard_product_delete' product.pk %}" class="btn btn-outline-danger ms-auto">Delete Product</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
