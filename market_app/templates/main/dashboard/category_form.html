{% extends "main/dashboard/base.html" %}
{% block dashboard_title %}{{ title }}{% endblock %}
{% load crispy_forms_tags %}
{% block dashboard_content %}
<h1 class="mb-4">{{ title }}</h1>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'dashboard_categories' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
