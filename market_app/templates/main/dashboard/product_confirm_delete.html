{% extends "main/dashboard/base.html" %}
{% block dashboard_title %}Delete Product{% endblock %}
{% block dashboard_content %}
<h1 class="mb-4">Delete Product</h1>
<div class="card">
  <div class="card-body">
    <p class="mb-4">Are you sure you want to delete <strong>{{ product.title }}</strong>? This cannot be undone.</p>
    <form method="post" action="{% url 'dashboard_product_delete' product.pk %}">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'dashboard_products' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
