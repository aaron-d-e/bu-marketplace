{% extends "main/base.html" %}
{% block title %}Delete Product{% endblock %}
{% block content %}
<div class="container py-4">
  <h1 class="mb-4">Delete Product</h1>
  <div class="card">
    <div class="card-body">
      <p class="mb-4">Are you sure you want to delete <strong>{{ product.title }}</strong>? This cannot be undone.</p>
      <form method="post" action="{% url 'dashboard_product_delete' product.pk %}">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Yes, delete</button>
          <a href="{% url 'dashboard_products' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <div class="mt-3"><a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">← Back to Dashboard</a></div>
</div>
{% endblock %}
