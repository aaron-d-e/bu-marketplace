{% extends "main/dashboard/base.html" %}
{% block dashboard_title %}Delete Category{% endblock %}
{% block dashboard_content %}
<h1 class="mb-4">Delete Category</h1>
<div class="card">
  <div class="card-body">
    <p class="mb-4">Are you sure you want to delete <strong>{{ category.name }}</strong>? Products using this category may need to be updated.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'dashboard_categories' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
