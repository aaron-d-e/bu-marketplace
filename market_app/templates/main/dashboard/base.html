{% extends "main/base.html" %}
{% block title %}{% block dashboard_title %}Admin Dashboard{% endblock %}{% endblock %}

{% block fullwidth_content %}
<div class="dashboard-layout" style="display: flex; flex-direction: row;">
  <aside class="dashboard-sidebar" style="width: 240px; min-width: 240px; flex-shrink: 0;">
    <div class="dashboard-sidebar-header">Admin</div>
    <nav style="display: flex; flex-direction: column;">
      <a href="{% url 'admin_dashboard' %}" class="dashboard-sidebar-link{% if request.path == '/admin-dashboard/' %} active{% endif %}">Overview</a>
      <a href="{% url 'dashboard_products' %}" class="dashboard-sidebar-link{% if 'product' in request.path %} active{% endif %}">Products</a>
      <a href="{% url 'dashboard_categories' %}" class="dashboard-sidebar-link{% if 'categor' in request.path %} active{% endif %}">Categories</a>
    </nav>
  </aside>
  <main class="dashboard-main" style="flex: 1;">
    <div class="container-fluid py-4 px-4">
      {% block dashboard_content %}{% endblock %}
    </div>
  </main>
</div>
{% endblock %}
