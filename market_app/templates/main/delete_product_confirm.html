{% extends "main/base.html" %}
{% block title %}Delete Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <h1 class="mb-4">Delete Product</h1>
    <p class="mb-4">Are you sure you want to delete <strong>{{ product.title }}</strong>? This cannot be undone.</p>
    <form method="post" action="{% url 'delete_product' product.pk %}">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'products' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
